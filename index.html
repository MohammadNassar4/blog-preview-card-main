<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./assets/images/favicon-32x32.png">
  
  <title>Frontend Mentor | Blog preview card</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="img-wrapper">
        <img src="assets/images/illustration-article.svg" alt="an illustration">
      </div>
      <div class="content">
        <p class="lable">Learning</p>
        <p class="puplish-date">Published 21 Dec 2026</p>
        <h2 class="card-title">HTML & CSS foundations</h2>
        <p class="card-desc">These languages are the backbone of every website, defining structure, content, and presentation.</p>
      </div>
      <div class="author-info">
        <div class="author-img-wrapper float-left">
          <img src="assets/images/image-avatar.webp" alt="profile picture of the author">
        </div>
        <h3 class="author-name float-left">Greg Hooper</h3>
        <div class="clear-fix"></div>
      </div>
    </div>
  </div>
</body>
</html>
